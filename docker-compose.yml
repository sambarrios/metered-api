services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: metered
      POSTGRES_PASSWORD: metered
      POSTGRES_DB: metered
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metered -d metered"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgres://metered:metered@db:5432/metered
      WEBHOOK_SIGNING_SECRET: dev-webhook-secret-change-me
      STAFF_JWT_SECRET: dev-staff-secret-change-me
      PORT: "3000"
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  # Vite dev server for the customer dashboard. Proxies /v1 to the api service.
  web-customer:
    build:
      context: ./apps/customer-web
      dockerfile: Dockerfile.dev
    environment:
      VITE_PROXY_TARGET: http://api:3000
    ports:
      - "5173:5173"
    depends_on:
      - api

  # Vite dev server for the ops console. Proxies /ops to the api service.
  web-ops:
    build:
      context: ./apps/ops-web
      dockerfile: Dockerfile.dev
    environment:
      VITE_PROXY_TARGET: http://api:3000
    ports:
      - "5174:5174"
    depends_on:
      - api

volumes:
  pgdata:
