services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET}
      STAFF_JWT_SECRET: ${STAFF_JWT_SECRET}
      PORT: "3000"
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  # Vite dev server for the customer dashboard. Proxies /v1 to the api service.
  web-customer:
    build:
      context: ./apps/customer-web
      dockerfile: Dockerfile.dev
    environment:
      VITE_PROXY_TARGET: http://api:3000
    ports:
      - "5173:5173"
    depends_on:
      - api

  # Vite dev server for the ops console. Proxies /ops to the api service.
  web-ops:
    build:
      context: ./apps/ops-web
      dockerfile: Dockerfile.dev
    environment:
      VITE_PROXY_TARGET: http://api:3000
    ports:
      - "5174:5174"
    depends_on:
      - api

volumes:
  pgdata:
